name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: PoornaSri26
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark
            output/github-snake-ocean.svg?palette=ocean
            output/github-snake-blue.svg?palette=blue-green
      
      - name: Push snake animation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update snake animation'
          branch: main
